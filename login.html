<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShop — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-auth.css">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-glow"></div>
  </div>

  <main class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">🔐</span>
        <h1>CyberShop</h1>
        <p class="brand-sub">Seguridad digital al alcance de todos</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="tu_usuario" autocomplete="username" required>
        </div>
        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="pass-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" id="togglePass">👁</button>
          </div>
        </div>
        <p class="form-error" id="loginError"></p>
        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <p class="auth-link">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    document.getElementById('togglePass').addEventListener('click', function() {
      const input = document.getElementById('password');
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      this.textContent = isText ? '👁' : '🙈';
    });
  </script>
</body>
</html>
